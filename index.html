<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlowApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #090910;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    /* Glow orbs */
    body::before, body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: #00d4ff;
      top: -100px; left: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: #00d4ff;
      bottom: -80px; right: -80px;
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 16px #00d4ff88);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .hi {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 1rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 48px;
    }

    .install-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 30px #00d4ff55;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .install-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 15px #00d4ff33;
    }

    .install-btn svg {
      width: 20px; height: 20px;
      fill: #000;
    }

    .note {
      margin-top: 20px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="icon">✦</div>
  <h1>GlowApp</h1>
  <p class="hi">hi 😂</p>
  <p class="tagline">Your space. Your vibe.</p>

  <!-- Replace the href below with your TestFlight link -->
  <a class="install-btn" href="https://testflight.apple.com/join/REPLACE_ME">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
    Install on iPhone (TestFlight)
  </a>

  <p class="note">Opens TestFlight — install it directly, no PC needed.</p>
</body>
</html>
