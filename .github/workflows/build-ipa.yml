name: Build IPA

on:
  push:
    branches: [ master, "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build & Archive (no signing)
        run: |
          xcodebuild archive \
            -project GlowApp.xcodeproj \
            -scheme GlowApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/GlowApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa"
          # Package the .app from the archive into an IPA manually
          APP_PATH=$(find "$RUNNER_TEMP/GlowApp.xcarchive/Products" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r GlowApp.ipa Payload
          echo "IPA created at $RUNNER_TEMP/ipa/GlowApp.ipa"
          ls -lh GlowApp.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowApp-IPA
          path: ${{ runner.temp }}/ipa/GlowApp.ipa
          retention-days: 30
