name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build archive
        run: |
          xcodebuild archive \
            -project GlowApp.xcodeproj \
            -scheme GlowApp \
            -configuration Release \
            -archivePath build/GlowApp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/GlowApp.xcarchive/Products/Applications/GlowApp.app build/Payload/
          cd build
          zip -r GlowApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GlowApp-IPA
          path: build/GlowApp.ipa
